name: Cache yfinance data

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/cache_yf_data.py"
      - ".github/workflows/cache-data.yml"
  schedule:
    # Weekly refresh, Sunday 22:00 UTC (after week's close)
    - cron: "0 22 * * 0"

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Download data
        run: python scripts/cache_yf_data.py

      - name: Commit cached CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/yf/*.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh yfinance data cache"
            git push
          fi
